services:
  - type: web
    name: eopyy-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase: neondb
      - key: API_KEY
        sync: false
      - key: API_HEADER
        value: X-API-Key

  - type: worker
    name: eopyy-worker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python worker.py
    envVars:
      - key: DATABASE_URL
        fromDatabase: neondb

databases:
  - name: neondb
